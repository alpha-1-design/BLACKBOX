AutoName: BLACKBOX
Description: |-
  BLACKBOX is an offline, security-first hub for developers and
  creators. Featuring an encrypted secrets manager, private journal,
  2FA authenticator, and comprehensive privacy tools, BLACKBOX
  ensures 100% on-device processing and zero cloud exposure.

  Core features:
  • Secrets Manager: API keys, tokens, passwords — AES-256-GCM
  • Encrypted Journal: timestamped, categorized entries
  • TOTP Authenticator: RFC 6238 2FA with live countdown
  • Privacy Toolkit: tracker stripping, fingerprint analysis,
    URL scanner, permission audit
  • Calculator decoy mode triggered by alternate PIN
  • Biometric unlock via Android BiometricPrompt
  • Self-destruct after 5 failed PIN attempts
  • Encrypted clipboard with 30s auto-clear
  • Screen dim overlay for public spaces
  • FLAG_SECURE blocks screenshots and screen recording

Repo: https://github.com/alpha-1-design/BLACKBOX

