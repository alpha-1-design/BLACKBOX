name: Build Debug APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: npm install

      - name: Regenerate Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Copy custom Java plugins
        run: |
          mkdir -p android/app/src/main/java/com/blackbox/app/
          cp custom-plugins/*.java android/app/src/main/java/com/blackbox/app/ 2>/dev/null || true
          cp custom-plugins/strings.xml android/app/src/main/res/values/ 2>/dev/null || true
          cp custom-plugins/build.gradle android/app/build.gradle 2>/dev/null || true

      - name: Sync web files
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BLACKBOX-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
