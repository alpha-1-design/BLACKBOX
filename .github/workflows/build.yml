name: Build Debug APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install dependencies
        run: npm install

      - name: Backup Java plugins
        run: |
          mkdir -p /tmp/java_backup
          cp android/app/src/main/java/com/shieldspace/app/*.java /tmp/java_backup/ 2>/dev/null || true
          cp android/app/src/main/res/values/strings.xml /tmp/java_backup/ 2>/dev/null || true
          cp android/app/src/main/res/drawable/ic_shield_overlay.xml /tmp/java_backup/ 2>/dev/null || true
          cp android/app/build.gradle /tmp/java_backup/build.gradle 2>/dev/null || true
          echo "Backed up files:"
          ls /tmp/java_backup/

      - name: Regenerate Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Restore Java plugins
        run: |
          cp /tmp/java_backup/*.java android/app/src/main/java/com/shieldspace/app/
          cp /tmp/java_backup/strings.xml android/app/src/main/res/values/ 2>/dev/null || true
          mkdir -p android/app/src/main/res/drawable
          cp /tmp/java_backup/ic_shield_overlay.xml android/app/src/main/res/drawable/ 2>/dev/null || true
          cp /tmp/java_backup/build.gradle android/app/build.gradle
          echo "Restored files:"
          ls android/app/src/main/java/com/shieldspace/app/

      - name: Sync web files
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShieldSpace-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
